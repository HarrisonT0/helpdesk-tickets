name: pipeline

on: [push, pull_request]

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .
      
      - name: Run full tests suites
        run: |
          uv run main.py &
          sleep 5
          uv run pytest -v .
          pkill -f "main.py"
    
  
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ hashFiles('pyproject.toml') }}
      
      - name: Install dependencies
        run: uv sync
      
      - name: Dependency vulnerability scan
        run: uv run pip-audit --progress-spinner off
      
      - name: Static security analysis
        run: uv run bandit -r ./helpdesk_manager
      
      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified --exclude-paths=.trufflehogignore
  
  container:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t helpdesk-app .

      - name: Docker image critical vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: helpdesk-app
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Container smoke test
        run: |
          docker run -d --name helpdesk-app -p 5000:5000 helpdesk-app
          sleep 5
          curl -f http://localhost:5000 || exit 1
          docker stop helpdesk-app

